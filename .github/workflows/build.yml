name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  QT_VERSION: '6.7.3'

jobs:
  # ============================================================================
  # Linux Build
  # ============================================================================
  linux-build:
    name: Linux (Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ \
            libgl-dev libglu1-mesa-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libssl-dev libdbus-1-dev

      - name: Install Qt ${{ env.QT_VERSION }}
        run: |
          pip install aqtinstall --quiet
          python3 -m aqt install-qt linux desktop ${{ env.QT_VERSION }} linux_gcc_64 \
            --outputdir $HOME/Qt
          echo "$HOME/Qt/${{ env.QT_VERSION }}/gcc_64/bin" >> $GITHUB_PATH
          echo "CMAKE_PREFIX_PATH=$HOME/Qt/${{ env.QT_VERSION }}/gcc_64" >> $GITHUB_ENV

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_QT6_GUI=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        run: cd build && ctest --output-on-failure || true

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: linux-build
          path: build/bin/

  # ============================================================================
  # Windows Build (MSVC 2022)
  # ============================================================================
  windows-build:
    name: Windows (VS 2022)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6.8.2
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true
          cache-key-prefix: qt-win-6.8.2

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DBUILD_QT6_GUI=ON

      - name: Build
        shell: pwsh
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Test
        shell: pwsh
        run: cd build; ctest -C ${{ env.BUILD_TYPE }} --output-on-failure; exit 0

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: windows-exe
          path: |
            build\**\*.exe
            !build\**\test*.exe

  # ============================================================================
  # Code Quality
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get install -y -qq cppcheck
          cppcheck --std=c++17 --suppress=missingInclude \
            --error-exitcode=0 src/ include/ 2>&1 | tail -10 || true

  # ============================================================================
  # Security Scan
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install and run Trivy
        run: |
          sudo apt-get install -y -qq wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] \
            https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq && sudo apt-get install -y trivy
          trivy fs . --severity HIGH,CRITICAL --exit-code 0 \
            --no-progress --timeout 5m || true
