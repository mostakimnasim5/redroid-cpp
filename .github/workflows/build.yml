name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  QT_VERSION: '6.8.*'

jobs:
  # ============================================================================
  # Linux Build
  # ============================================================================
  linux-build:
    name: Linux (Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build g++ \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libxcb-xinerama0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libssl-dev \
            libdbus-1-dev \
            libegl1-mesa-dev

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true
          aqtversion: '==3.3.*'

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTS=ON \
            -DENABLE_LOGGING=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure --timeout 300
        continue-on-error: true

      - name: Package
        run: |
          mkdir -p artifacts
          tar -czf artifacts/ReDroidCPP-Linux-x64.tar.gz \
            -C build --exclude='*.a' --exclude='tests/*' .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: artifacts/

  # ============================================================================
  # Windows Build (MSVC)
  # ============================================================================
  windows-build:
    name: Windows (VS 2022)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true
          aqtversion: '==3.3.*'

      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build \
            -G "Visual Studio 17 2022" -A x64 \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTS=ON \
            -DENABLE_LOGGING=ON

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Run Tests
        shell: bash
        run: |
          cd build
          ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --timeout 300
        continue-on-error: true

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          cmake --install build `
            --config ${{ env.BUILD_TYPE }} `
            --prefix artifacts/install
          Compress-Archive `
            -Path artifacts/install `
            -DestinationPath artifacts/ReDroidCPP-Windows-x64.zip `
            -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: artifacts/*.zip

  # ============================================================================
  # Code Quality
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck clang-format

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance \
            --std=c++17 \
            --suppress=missingInclude \
            --suppress=unmatchedSuppression \
            --error-exitcode=0 \
            src/ include/ 2>&1 | head -50 || true

      - name: Check formatting
        run: |
          find src include -name "*.cpp" -o -name "*.h" -o -name "*.hpp" | \
            head -5 | xargs clang-format --dry-run 2>/dev/null || true

  # ============================================================================
  # Security Scan (non-blocking)
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
        continue-on-error: true
