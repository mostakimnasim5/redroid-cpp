name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  QT_VERSION: '6.8.*'

jobs:
  # ============================================================================
  # Linux Build
  # ============================================================================
  linux-build:
    name: Linux (Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            cmake ninja-build g++ \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxcb-xinerama0-dev libxcb-icccm4-dev \
            libxcb-image0-dev libxcb-keysyms1-dev \
            libxcb-randr0-dev libxcb-render-util0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libfontconfig1-dev libfreetype6-dev \
            libssl-dev libdbus-1-dev libegl1-mesa-dev \
            libgstreamer-gl1.0-0 libgstreamer-plugins-base1.0-dev

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: gcc_64
          cache: true
          extra: >-
            --external 7z
            -b https://mirrors.dotsrc.org/qtproject

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_QT6_GUI=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure --timeout 120
        continue-on-error: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/bin/

  # ============================================================================
  # Windows Build (MSVC)
  # ============================================================================
  windows-build:
    name: Windows (VS 2022)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true
          extra: >-
            -b https://mirrors.dotsrc.org/qtproject

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -B build ^
            -G "Visual Studio 17 2022" -A x64 ^
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ^
            -DBUILD_QT6_GUI=ON

      - name: Build
        shell: cmd
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Run Tests
        shell: cmd
        run: |
          cd build
          ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --timeout 120
        continue-on-error: true

      - name: Package EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          Copy-Item -Path "build\bin\${{ env.BUILD_TYPE }}\ReDroidCPP.exe" `
            -Destination "artifacts\" -ErrorAction SilentlyContinue
          Copy-Item -Path "build\bin\ReDroidCPP.exe" `
            -Destination "artifacts\" -ErrorAction SilentlyContinue

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: artifacts/

  # ============================================================================
  # Code Quality
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance \
            --std=c++17 \
            --suppress=missingInclude \
            --suppress=unmatchedSuppression \
            --error-exitcode=0 \
            src/ include/ 2>&1 | tail -20 || true
          echo "✅ Code quality check done"

  # ============================================================================
  # Security Scan
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] \
            https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Run Trivy scan
        run: |
          trivy fs . \
            --severity HIGH,CRITICAL \
            --format table \
            --exit-code 0 \
            --no-progress \
            --timeout 5m \
            2>&1 | tail -30 || true
          echo "✅ Security scan done"
