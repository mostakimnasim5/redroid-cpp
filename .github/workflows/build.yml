name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  QT_VERSION: '6.5'
  CMAKE_VERSION: '3.28'

jobs:
  # ============================================================================
  # Linux Build
  # ============================================================================
  linux-build:
    name: Linux (Ubuntu 22.04)
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            libgl1-mesa-dev \
            libxcb-xinerama0-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render-util0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libssl-dev
            
      - name: Setup Qt ${{ env.QT_VERSION }}
        uses: jurplel/qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          
      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTS=ON \
            -DENABLE_LOGGING=ON
            
      - name: Build
        run: cmake --build build --parallel $(nproc)
        
      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure --timeout 300
          
      - name: Package
        run: |
          mkdir -p artifacts
          tar -czf artifacts/ReDroidCPP-Linux-x64.tar.gz -C build --exclude='*.a' --exclude='tests/*' .
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: artifacts/

  # ============================================================================
  # Windows Build (MSVC)
  # ============================================================================
  windows-build:
    name: Windows (VS 2022)
    runs-on: windows-2022
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2
        
      - name: Setup Qt ${{ env.QT_VERSION }}
        uses: jurplel/qt-action@v3
        with:
          version: ${{ env.QT_VERSION }}
          modules: qtbase qttools
          cached: true
          
      - name: Configure CMake
        shell: bash
        run: |
          cmake -B build \
            -G "Visual Studio 17 2022" -A x64 \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTS=ON \
            -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}/.." \
            -DENABLE_LOGGING=ON
            
      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel $(nproc)
        
      - name: Run Tests
        shell: bash
        run: |
          cd build
          ctest -C ${{ env.BUILD_TYPE }} --output-on-failure --timeout 300
          
      - name: Package
        shell: bash
        run: |
          mkdir -p artifacts
          cmake --install build --config ${{ env.BUILD_TYPE }} --prefix artifacts/install
          tar -czf artifacts/ReDroidCPP-Windows-x64.zip artifacts/install/
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: artifacts/

  # ============================================================================
  # Code Quality Check
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake cppcheck clang-format clang-tidy
            
      - name: Run cppcheck
        run: |
          find src include -name "*.cpp" -o -name "*.h" -o -name "*.hpp" | \
            xargs cppcheck --enable=all --std=c++17 --inline-suppr 2>/dev/null || true
            
      - name: Check formatting
        run: |
          find src include -name "*.cpp" -o -name "*.h" -o -name "*.hpp" | \
            head -20 | xargs clang-format --dry-run --Werror 2>/dev/null || true

  # ============================================================================
  # Security Scan
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          
      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

# ================================================================================
# Build Matrix
# ================================================================================
