name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  # ============================================================================
  # Linux Build
  # ============================================================================
  linux-build:
    name: Linux (Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ \
            libgl-dev libglu1-mesa-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libssl-dev libdbus-1-dev

      - name: Install Qt 6.8
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: linux
          target: desktop
          arch: gcc_64
          cache: true
          cache-key-prefix: qt-linux-6.8.3

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_QT6_GUI=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -j$(nproc) || true

      - name: Upload
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: linux-build
          path: build/bin/

  # ============================================================================
  # Windows Build
  # ============================================================================
  windows-build:
    name: Windows (VS 2022)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.8
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true
          cache-key-prefix: qt-windows-6.8.3

      - name: Configure
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DBUILD_QT6_GUI=ON
        shell: pwsh

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel
        shell: pwsh

      - name: Test
        working-directory: build
        run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure || true
        shell: pwsh

      - name: Upload
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: windows-exe
          path: build/**/*.exe

  # ============================================================================
  # Code Quality
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: cppcheck
        run: |
          sudo apt-get install -y -qq cppcheck
          cppcheck --std=c++17 \
            --suppress=missingInclude \
            --suppress=unmatchedSuppression \
            --enable=warning \
            --error-exitcode=0 \
            src/ include/ 2>&1 | tail -20 || true

  # ============================================================================
  # Security Scan
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y -qq wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] \
            https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Scan
        run: |
          trivy fs . \
            --severity HIGH,CRITICAL \
            --exit-code 0 \
            --no-progress \
            --timeout 5m || true
