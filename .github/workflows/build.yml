name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  QT_VERSION: '6.7.3'

jobs:
  # ============================================================================
  # Linux Build
  # ============================================================================
  linux-build:
    name: Linux (Ubuntu 22.04)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ \
            libgl-dev libglu1-mesa-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libssl-dev libdbus-1-dev

      - name: Install Qt ${{ env.QT_VERSION }} via aqtinstall
        run: |
          pip install aqtinstall --quiet
          python3 -m aqt install-qt linux desktop ${{ env.QT_VERSION }} linux_gcc_64 \
            --outputdir $HOME/Qt
          echo "$HOME/Qt/${{ env.QT_VERSION }}/gcc_64/bin" >> $GITHUB_PATH
          echo "CMAKE_PREFIX_PATH=$HOME/Qt/${{ env.QT_VERSION }}/gcc_64" >> $GITHUB_ENV
          echo "Qt6_DIR=$HOME/Qt/${{ env.QT_VERSION }}/gcc_64/lib/cmake/Qt6" >> $GITHUB_ENV

      - name: Verify Qt
        run: qmake --version

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_QT6_GUI=ON \
            -DCMAKE_PREFIX_PATH=$HOME/Qt/${{ env.QT_VERSION }}/gcc_64

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure || true

      - name: Upload
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: linux-build
          path: build/bin/

  # ============================================================================
  # Windows Build (MSVC)
  # ============================================================================
  windows-build:
    name: Windows (VS 2022)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt ${{ env.QT_VERSION }}
        shell: pwsh
        run: |
          pip install aqtinstall --quiet
          python -m aqt install-qt windows desktop ${{ env.QT_VERSION }} win64_msvc2022_64 `
            --outputdir C:\Qt
          echo "C:\Qt\${{ env.QT_VERSION }}\msvc2022_64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "Qt6_DIR=C:\Qt\${{ env.QT_VERSION }}\msvc2022_64\lib\cmake\Qt6" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "CMAKE_PREFIX_PATH=C:\Qt\${{ env.QT_VERSION }}\msvc2022_64" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DCMAKE_PREFIX_PATH="C:\Qt\${{ env.QT_VERSION }}\msvc2022_64" `
            -DBUILD_QT6_GUI=ON

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel
        shell: pwsh

      - name: Test
        working-directory: build
        run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure || true
        shell: pwsh

      - name: Upload
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: windows-exe
          path: |
            build/**/*.exe
            !build/**/test*.exe

  # ============================================================================
  # Code Quality
  # ============================================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: cppcheck
        run: |
          sudo apt-get install -y -qq cppcheck
          cppcheck --std=c++17 \
            --suppress=missingInclude \
            --suppress=unmatchedSuppression \
            --enable=warning \
            --error-exitcode=0 \
            src/ include/ 2>&1 | tail -20 || true

  # ============================================================================
  # Security Scan
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y -qq wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] \
            https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq && sudo apt-get install -y trivy

      - name: Scan
        run: |
          trivy fs . --severity HIGH,CRITICAL \
            --exit-code 0 --no-progress --timeout 5m || true
