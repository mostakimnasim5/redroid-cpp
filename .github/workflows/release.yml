name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v3.1.0)'
        required: true
        type: string
      prerelease:
        description: 'Create as pre-release'
        required: false
        type: boolean
        default: false

env:
  BUILD_TYPE: Release
  QT_VERSION: '6.8.*'

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build g++ \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxcb-xinerama0-dev libxcb-icccm4-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libssl-dev libdbus-1-dev libegl1-mesa-dev

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          cache: true
          aqtversion: '==3.3.*'

      - name: Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DENABLE_LOGGING=OFF
          cmake --build build --parallel $(nproc)

      - name: Package
        run: |
          mkdir -p release
          cmake --install build --prefix release/install
          cd release
          tar -czf ReDroidCPP-Linux-x64-${{ inputs.version }}.tar.gz install/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: release/*.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Install Qt ${{ env.QT_VERSION }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          cache: true
          aqtversion: '==3.3.*'

      - name: Build
        shell: pwsh
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DENABLE_LOGGING=OFF
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Package
        shell: pwsh
        run: |
          cmake --install build `
            --config ${{ env.BUILD_TYPE }} `
            --prefix release/install
          Compress-Archive `
            -Path release/install `
            -DestinationPath "release/ReDroidCPP-Windows-x64-${{ inputs.version }}.zip" `
            -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/*.zip

  create-release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare files
        run: |
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" \) \
            -exec mv {} . \;

      - name: Generate changelog
        id: changelog
        run: |
          {
            echo "changelog<<EOF"
            echo "## ReDroidCPP ${{ inputs.version }}"
            echo ""
            echo "### Changes"
            git log --oneline -20
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ReDroidCPP ${{ inputs.version }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: ${{ inputs.prerelease }}
          files: |
            *.tar.gz
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
