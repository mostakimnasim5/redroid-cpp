# ==============================================================================
# VirtualPhonePro - Docker Compose Configuration
# Windows-optimized with dynamic property passing
# ==============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # VirtualPhonePro Instance Template
  # Copy this service block for each emulator instance you want to run
  # ---------------------------------------------------------------------------
  vpp-instance:
    build:
      context: ..
      dockerfile: docker/Dockerfile.custom
    container_name: vpp-instance-1
    hostname: android-vpp-${INSTANCE_ID:-1}
    image: virtualphonepro/emulator:latest
    
    # ═══════════════════════════════════════════════════════════════════════
    # DEVICE IDENTITY (Passed from Windows C++ Host)
    # These environment variables are read by the init scripts
    # ═══════════════════════════════════════════════════════════════════════
    environment:
      # Device Configuration
      - VPP_DEVICE_MANUFACTURER=Samsung
      - VPP_DEVICE_BRAND=samsung
      - VPP_DEVICE_MODEL=SM-S928B
      - VPP_DEVICE_NAME=dm3q
      - VPP_DEVICE=dm3q
      - VPP_PRODUCT=dm3q
      
      # Android Version
      - VPP_ANDROID_VERSION=14
      - VPP_BUILD_ID=UP1A.231005.007
      - VPP_BUILD_TYPE=userdebug
      - VPP_SECURITY_PATCH=2024-01-01
      
      # Bootloader & Fingerprint
      - VPP_BOOTLOADER=S928BXXU1AXXX
      - VPP_FINGERPRINT_PREFIX=samsung/dm3q/dm3q
      
      # Device Identity (Unique per instance - generate these!)
      # Example generation in Windows C++:
      #   IMEI = GenerateLuhnValidIMEI("35875109")  // Samsung TAC
      #   Serial = GenerateSerialNumber("Samsung")
      - VPP_IMEI=${DYNAMIC_IMEI:-358751090123456}
      - VPP_IMEI2=${DYNAMIC_IMEI2:-358751090123457}
      - VPP_SERIAL=${DYNAMIC_SERIAL:-R5CW80XXXXXX}
      - VPP_ANDROID_ID=${DYNAMIC_ANDROID_ID:-a1b2c3d4e5f6g7h8}
      - VPP_GSF_ID=${DYNAMIC_GSF_ID:-1234567890}
      - VPP_ADVERTISING_ID=${DYNAMIC_AAID:-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx}
      
      # Network (Unique MAC addresses per instance)
      - VPP_WIFI_MAC=${DYNAMIC_WIFI_MAC:-8C:71:F8:AA:BB:CC}
      - VPP_BLUETOOTH_MAC=${DYNAMIC_BT_MAC:-8C:71:F8:DD:EE:FF}
      - VPP_HOSTNAME=android-vpp-${INSTANCE_ID:-1}
      
      # SIM Configuration
      - VPP_ICCID=${DYNAMIC_ICCID:-8961012345678901234}
      - VPP_IMSI=${DYNAMIC_IMSI:-310260123456789}
      - VPP_CARRIER=T-Mobile
      - VPP_MCC=310
      - VPP_MNC=260
      
      # GPS Location
      - VPP_GPS_LAT=${DYNAMIC_GPS_LAT:-37.7749}
      - VPP_GPS_LON=${DYNAMIC_GPS_LON:-122.4194}
      
      # GPU Mode (swiftshader for compatibility on Windows)
      - REDROID_GPU_MODE=${GPU_MODE:-swiftshader}
      
      # Memory Optimization (512MB-768MB per instance)
      - REDROID_MEMSTART=0x80000000
      - REDROID_MEMSIZE=${MEMORY_LIMIT:-512M}
      
      # Network Configuration
      - ADB_PORT=${DYNAMIC_ADB_PORT:-5555}
      
      # Redroid Configuration
      - REDROID_CTS=0
      - ROG_BOOTANIMATION=false
      - ROG_DISABLE_FPS_LIMIT=true
    
    # ═══════════════════════════════════════════════════════════════════════
    # DEVICE PASSTHROUGH (Required for Android)
    # ═══════════════════════════════════════════════════════════════════════
    devices:
      - /dev/kvm:/dev/kvm
      - /dev/binderfs:/dev/binderfs
      - /dev/binder:/dev/binder
      - /dev/hwbinder:/dev/hwbinder
      - /dev/vndbinder:/dev/vndbinder
    
    # ═══════════════════════════════════════════════════════════════════════
    # VOLUMES (For profile persistence and dynamic config)
    # ═══════════════════════════════════════════════════════════════════════
    volumes:
      # Mount dynamic device properties file (generated by Windows C++ host)
      # This allows passing pre-generated properties instead of env vars
      - ./data/instances/${INSTANCE_ID:-1}/device.properties:/opt/vpp/config/device.properties:ro
      
      # Mount profiles directory
      - ./profiles:/opt/vpp/profiles:ro
      
      # Persistent data
      - vpp-data-${INSTANCE_ID:-1}:/data
    
    # ═══════════════════════════════════════════════════════════════════════
    # NETWORKING
    # ═══════════════════════════════════════════════════════════════════════
    ports:
      - "${DYNAMIC_ADB_PORT:-5555}:5555"   # ADB
      - "${DYNAMIC_VNC_PORT:-5900}:5900"   # VNC
    
    # Network isolation per instance
    networks:
      - vpp-network-${INSTANCE_ID:-1}
    
    # Health check
    healthcheck:
      test: ["CMD", "/system/bin/getprop", "sys.boot_completed"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 120s
    
    # Restart policy
    restart: unless-stopped
    
    # Runtime resources
    shm_size: 256mb
    mem_limit: ${MEMORY_LIMIT:-512m}
    memswap_limit: ${MEMORY_LIMIT:-512m}
    cpu_period: 100000
    cpu_quota: 200000  # 2 cores max
    
    # ulimits
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

