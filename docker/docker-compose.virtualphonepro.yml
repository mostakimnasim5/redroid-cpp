# ═══════════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════════════════════
networks:
  vpp-network-1:
    name: vpp-network-1
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/24
  vpp-network-2:
    name: vpp-network-2
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.1.0/24

# ═══════════════════════════════════════════════════════════════════════════════
# VOLUMES
# ═══════════════════════════════════════════════════════════════════════════════
volumes:
  vpp-data-1:
    name: vpp-data-1
  vpp-data-2:
    name: vpp-data-2
