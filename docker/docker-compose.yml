# ==============================================================================
# ReDroidCPP - Android Emulator Docker Compose
# ==============================================================================

services:
  android-emulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: android-emulator
    image: redroid-cpp/android-emulator:latest

    # X11 Forwarding for Native Desktop Display
    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - DISPLAY=host.docker.internal:0
      - ANDROID_EMULATOR_VERSION=34
      - ANDROID_SDK_ROOT=/opt/android-sdk
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64

    ports:
      - "5554:5554"  # ADB
      - "5555:5555"  # ADB

    devices:
      - /dev/kvm:/dev/kvm

    volumes:
      - avd_data:/root/.android

    mem_limit: 4g
    shm_size: 2gb

    healthcheck:
      test: ["CMD", "adb", "shell", "getprop", "sys.boot_completed"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

    restart: unless-stopped

volumes:
  avd_data:
