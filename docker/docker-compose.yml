# ==============================================================================
# ReDroidCPP - ReDroid Docker Compose
# Uses lightweight ReDroid (Real Docker Android) container
# ==============================================================================

services:
  android-emulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.custom
    container_name: android-emulator
    image: redroid-cpp/android-emulator:latest
    hostname: android-emulator
    
    # Privileged mode is REQUIRED for ReDroid - do not remove
    privileged: true
    
    # KVM access for hardware acceleration (REQUIRED for production)
    # On Linux with KVM: uncomment the devices section
    # devices:
    #   - /dev/kvm:/dev/kvm
    #   - /dev/fuse:/dev/fuse

    environment:
      # GPU Mode: swiftshader (no GPU), host (hardware GPU), auto
      - REDROID_GPU_MODE=swiftshader
      # Memory: 512M minimum, 1G recommended
      - REDROID_MEM_SIZE=512M
      # KVM: set to 0 to disable if KVM not available
      - REDROID_VGPU=KVM

    ports:
      - "5555:5555"  # ADB

    healthcheck:
      test: ["CMD", "getprop", "sys.boot_completed"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 60s

    # Remove restart policy if KVM is not available
    # In production with KVM, use: restart: unless-stopped
    restart: "no"

volumes:
  device_data:
