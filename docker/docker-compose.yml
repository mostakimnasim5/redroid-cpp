# ==============================================================================
# RedroidCPP - Docker Compose Configuration
# Android Emulator with Device Profile Integration
# ==============================================================================

services:
  # ---------------------------------------------------------------------------
  # Redroid Android Emulator Container
  # ---------------------------------------------------------------------------
  redroid:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: redroid-emulator
    hostname: android-emulator
    image: redroid-cpp/emulator:latest
    
    # Privileged mode required for Android emulation
    privileged: true
    cgroup: host
    
    # Device provisioning environment
    environment:
      # Device Configuration
      - DEVICE_MANUFACTURER=Samsung
      - DEVICE_MODEL=Galaxy S24 Ultra
      - DEVICE_ANDROID_VERSION=15
      - DEVICE_PROFILE_ID=
      
      # Network Configuration
      - ADB_PORT=15555
      - REDROID_GPU_MODE=host
      
      # Setup flags
      - SETUP_DEVICE=true
      - GENERATE_IMEI=true
      - GENERATE_SERIAL=true
      
    # Device passthrough
    devices:
      - /dev/kvm:/dev/kvm
      - /dev/binderfs:/dev/binderfs
      - /dev/binder:/dev/binder
      - /dev/hwbinder:/dev/hwbinder
      - /dev/vndbinder:/dev/vndbinder
    
    # Mount volumes
    volumes:
      - ../profiles:/opt/profiles:ro
      - ../data:/data
      - redroid-data:/data
      
    # Port mapping
    ports:
      - "15555:5555"
      - "5900:5900"
    
    # Health check
    healthcheck:
      test: ["CMD", "getprop", "sys.boot_completed"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    
    # Restart policy
    restart: unless-stopped
    
    # Runtime options
    shm_size: 256mb
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # ---------------------------------------------------------------------------
  # CLI Management Tool
  # ---------------------------------------------------------------------------
  cli:
    image: redroid-cpp/emulator:latest
    container_name: redroid-cli
    command: ["help"]
    volumes:
      - ../profiles:/opt/profiles:ro
      - ../data:/data
    network_mode: host
    profiles:
      - cli

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  redroid-data:
