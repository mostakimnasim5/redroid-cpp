# ==============================================================================
# ReDroidCPP - ReDroid Docker Compose
# Uses lightweight ReDroid (Real Docker Android) container
# ==============================================================================

services:
  android-emulator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.custom
    container_name: android-emulator
    image: redroid-cpp/android-emulator:latest
    hostname: android-emulator
    
    # Privileged mode required for ReDroid
    privileged: true
    
    # KVM access for hardware acceleration
    devices:
      - /dev/kvm:/dev/kvm
      - /dev/fuse:/dev/fuse

    environment:
      # ReDroid GPU Mode (swiftshader for software, auto for hardware)
      - REDROID_GPU_MODE=swiftshader
      # ReDroid Memory Configuration
      - REDROID_MEM_SIZE=512M
      # Device Configuration (default values)
      - VPP_DEVICE_MANUFACTURER=Samsung
      - VPP_DEVICE_MODEL=SM-S928B
      - VPP_ANDROID_VERSION=14

    ports:
      - "5555:5555"  # ADB

    volumes:
      # Device profiles persistence
      - ./configs:/opt/vpp/config:ro
      - ./bin:/opt/vpp/scripts:ro
      - device_data:/data

    # KVM is required for ReDroid
    cap_add:
      - NET_ADMIN

    healthcheck:
      test: ["CMD", "getprop", "sys.boot_completed"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 60s

    restart: unless-stopped

volumes:
  device_data:
